{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Profile - Job Reference Hub{% endblock %}

{% block content %}
<style>
    .edit-profile-container {
        max-width: 800px;
        margin: 3rem auto;
        padding: 0 5%;
    }

    .form-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: var(--radius-lg);
        padding: 2.5rem;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: var(--transition);
        animation: slideUp 0.5s ease-out;
    }

    .form-card:hover {
        background: rgba(255, 255, 255, 0.85);
        box-shadow: var(--shadow-lg);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .form-card h1 {
        font-size: 2rem;
        font-weight: 700;
        color: var(--gray-900);
        margin-bottom: 0.25rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .form-subtitle {
        color: var(--gray-500);
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
    }

    .form-group {
        margin-bottom: 0;
        position: relative;
    }

    .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        color: var(--gray-700);
        font-weight: 600;
        font-size: 0.875rem;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 2px solid rgba(0, 0, 0, 0.08);
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        font-family: inherit;
        transition: all 0.3s;
        background: rgba(255, 255, 255, 0.5);
        color: var(--gray-800);
    }

    .form-group input:hover,
    .form-group textarea:hover,
    .form-group select:hover {
        border-color: var(--gray-300);
        background: rgba(255, 255, 255, 0.8);
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
        outline: none;
        border-color: var(--primary);
        background: white;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 100px;
    }

    .full-width {
        grid-column: 1 / -1;
    }

    .btn-group {
        display: flex;
        gap: 1rem;
        margin-top: 2rem;
        grid-column: 1 / -1;
        flex-wrap: wrap;
    }

    .btn {
        padding: 0.75rem 2rem;
        border-radius: var(--radius-sm);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        border: none;
        line-height: 1;
    }

    .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15);
    }

    .btn-primary:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
    }

    .btn-outline {
        background: transparent;
        border: 2px solid rgba(0, 0, 0, 0.08);
        color: var(--gray-700);
    }

    .btn-outline:hover {
        border-color: var(--primary);
        color: var(--primary);
        transform: translateY(-2px);
    }

    .errorlist {
        color: var(--danger);
        list-style: none;
        padding: 0;
        margin-top: 0.25rem;
        font-size: 0.85rem;
    }

    /* Dark Mode */
    body.dark-mode .form-card {
        background: rgba(30, 41, 59, 0.6);
        border-color: rgba(255, 255, 255, 0.05);
    }

    body.dark-mode .form-card:hover {
        background: rgba(30, 41, 59, 0.8);
    }

    body.dark-mode .form-card h1 {
        color: #e2e8f0;
    }

    body.dark-mode .form-group label {
        color: #94a3b8;
    }

    body.dark-mode .form-group input,
    body.dark-mode .form-group textarea,
    body.dark-mode .form-group select {
        background: rgba(30, 41, 59, 0.5);
        border-color: rgba(255, 255, 255, 0.08);
        color: #e2e8f0;
    }

    body.dark-mode .form-group input:hover,
    body.dark-mode .form-group textarea:hover,
    body.dark-mode .form-group select:hover {
        background: rgba(30, 41, 59, 0.7);
        border-color: #334155;
    }

    body.dark-mode .form-group input:focus,
    body.dark-mode .form-group textarea:focus,
    body.dark-mode .form-group select:focus {
        background: #1e293b;
        border-color: #60a5fa;
        box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.1);
    }

    body.dark-mode .btn-outline {
        border-color: rgba(255, 255, 255, 0.1);
        color: #94a3b8;
    }

    body.dark-mode .btn-outline:hover {
        border-color: #60a5fa;
        color: #60a5fa;
    }

    @media (max-width: 768px) {
        .form-grid {
            grid-template-columns: 1fr;
        }

        .form-card {
            padding: 1.5rem;
        }

        .btn-group {
            flex-direction: column;
        }

        .btn-group .btn {
            justify-content: center;
        }
    }

    @media (max-width: 480px) {
        .form-card {
            padding: 1.25rem;
        }

        .form-card h1 {
            font-size: 1.5rem;
        }
    }
</style>

<div class="edit-profile-container">
    <div class="form-card">
        <h1>✏️ Edit Profile</h1>
        <p class="form-subtitle">Update your personal information and preferences</p>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-grid">
                {{ user_form.as_p }}
                {{ profile_form.as_p }}

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">
                        💾 Save Changes
                    </button>
                    <a href="{% url 'profile' %}" class="btn btn-outline">
                        ← Cancel
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
