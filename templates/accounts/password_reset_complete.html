{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset Complete - Job Reference Hub{% endblock %}

{% block content %}
<style>
    .complete-container {
        max-width: 650px;
        margin: 4rem auto;
        padding: 0 5%;
        text-align: center;
    }

    .complete-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: var(--radius-lg);
        padding: 3rem 2.5rem;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: var(--transition);
        animation: slideUp 0.5s ease-out;
    }

    .complete-card:hover {
        background: rgba(255, 255, 255, 0.85);
        box-shadow: var(--shadow-lg);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .complete-icon {
        font-size: 4rem;
        display: block;
        margin-bottom: 1.5rem;
        animation: bounce 0.8s ease-out;
    }

    @keyframes bounce {
        0% { transform: scale(0); }
        50% { transform: scale(1.3); }
        70% { transform: scale(0.9); }
        100% { transform: scale(1); }
    }

    .complete-title {
        font-size: 2rem;
        font-weight: 700;
        color: var(--gray-900);
        margin-bottom: 0.75rem;
    }

    .complete-subtitle {
        color: var(--gray-500);
        font-size: 1.05rem;
        line-height: 1.7;
        margin-bottom: 2rem;
    }

    .complete-btn {
        display: inline-block;
        padding: 0.9rem 3rem;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15);
    }

    .complete-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
    }

    /* Dark Mode */
    body.dark-mode .complete-card {
        background: rgba(30, 41, 59, 0.6);
        border-color: rgba(255, 255, 255, 0.05);
    }

    body.dark-mode .complete-card:hover {
        background: rgba(30, 41, 59, 0.8);
    }

    body.dark-mode .complete-title {
        color: #e2e8f0;
    }

    @media (max-width: 480px) {
        .complete-card {
            padding: 1.5rem;
        }

        .complete-title {
            font-size: 1.6rem;
        }
    }
</style>

<div class="complete-container">
    <div class="complete-card">
        <h1 class="complete-title">Password Reset Complete!</h1>
        <p class="complete-subtitle">
            Your password has been successfully reset. You can now login with your new password.
        </p>

        <a href="{% url 'login' %}" class="complete-btn">Login Now →</a>
    </div>
</div>
{% endblock %}
