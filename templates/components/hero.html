<!-- components/hero.html -->
{% load static %}

<!-- Hero Section Styles - Only affects the hero area -->
<style>
    /* Hero Section Specific Styles */
    .hero-section-custom {
        position: relative;
        z-index: 1;
        min-height: 40vh;
        display: flex;
        align-items: center;
        padding: 10px 4% 40px;
        gap: 1.5rem;
        background: #060918;
        overflow: hidden;
    }

    .hero-section-custom .bg-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 0;
        pointer-events: none;
    }

    .hero-section-custom .bg-gradient {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background:
            radial-gradient(ellipse at 20% 40%, rgba(59, 130, 246, 0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 50%, rgba(139, 92, 246, 0.06) 0%, transparent 60%),
            radial-gradient(ellipse at 50% 90%, rgba(6, 182, 212, 0.04) 0%, transparent 50%),
            linear-gradient(180deg, #060918 0%, #0a0f25 50%, #060918 100%);
    }

    .hero-section-custom .digital-grid {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-image:
            linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: gridShift 15s linear infinite;
    }

    @keyframes gridShift {
        0% { transform: translate(0, 0); }
        100% { transform: translate(40px, 40px); }
    }

    .hero-section-custom .stars-layer {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
    }

    .hero-section-custom .star-dot {
        position: absolute;
        background: white;
        border-radius: 50%;
        animation: starTwinkle var(--duration) ease-in-out infinite;
        animation-delay: var(--delay);
    }

    @keyframes starTwinkle {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.5); }
    }

    .hero-section-custom .hero-left {
        flex: 1;
        max-width: 550px;
        z-index: 2;
        position: relative;
    }

    .hero-section-custom .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1rem;
        background: rgba(59, 130, 246, 0.08);
        border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 30px;
        font-size: 0.82rem;
        color: #60a5fa;
        margin-bottom: 1.5rem;
        backdrop-filter: blur(10px);
    }

    .hero-section-custom .hero-badge .live-dot {
        width: 7px; height: 7px;
        background: #10b981;
        border-radius: 50%;
        animation: livePulse 1.5s infinite;
        box-shadow: 0 0 8px #10b981;
    }

    @keyframes livePulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.8); }
    }

    .hero-section-custom .hero-badge .update-time-text {
        font-weight: 600;
        color: #f1f5f9;
        margin-left: 0.15rem;
    }

    .hero-section-custom .hero-title {
        font-size: 3.6rem;
        font-weight: 800;
        line-height: 1.08;
        margin-bottom: 1.3rem;
        color: white;
        letter-spacing: -0.02em;
    }

    .hero-section-custom .hero-title .glow-text {
        background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.5));
        animation: textGlow 3s ease-in-out infinite;
    }

    @keyframes textGlow {
        0%, 100% { filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.5)); }
        50% { filter: drop-shadow(0 0 50px rgba(139, 92, 246, 0.8)); }
    }

    .hero-section-custom .hero-desc {
        font-size: 1.05rem;
        color: #94a3b8;
        line-height: 1.65;
        margin-bottom: 1.8rem;
        max-width: 480px;
    }

    /* Selected Country Indicator */
    .hero-section-custom .selected-country-indicator {
        display: none;
        align-items: center;
        gap: 0.75rem;
        padding: 0.6rem 1.2rem;
        background: rgba(59, 130, 246, 0.12);
        border: 1px solid rgba(59, 130, 246, 0.25);
        border-radius: 30px;
        backdrop-filter: blur(10px);
        margin-top: 1rem;
        animation: slideUp 0.4s ease-out;
    }

    .hero-section-custom .selected-country-indicator.show {
        display: inline-flex;
    }

    .hero-section-custom .selected-country-indicator .country-flag {
        font-size: 1.2rem;
    }

    .hero-section-custom .selected-country-indicator .country-name {
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
    }

    .hero-section-custom .selected-country-indicator .country-jobs {
        color: #60a5fa;
        font-size: 0.85rem;
        font-weight: 500;
    }

    .hero-section-custom .selected-country-indicator .clear-selection {
        background: none;
        border: none;
        color: #94a3b8;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 0 0.25rem;
        transition: var(--transition);
    }

    .hero-section-custom .selected-country-indicator .clear-selection:hover {
        color: #ef4444;
        transform: scale(1.1);
    }

    /* Globe Container */
    .hero-section-custom .hero-right {
        flex: 1.3;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        min-height: 350px;
    }

    .hero-section-custom .globe-wrapper {
        position: relative;
        width: 320px;
        height: 320px;
    }

    .hero-section-custom canvas { display: block; width: 100%; height: 100%; }

    .hero-section-custom .drag-hint {
        position: absolute;
        bottom: 5px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: #4a5568;
        font-size: 0.75rem;
        background: rgba(255, 255, 255, 0.03);
        padding: 0.4rem 1rem;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        pointer-events: none;
        transition: opacity 0.5s ease;
        z-index: 5;
    }

    .hero-section-custom .drag-hint.is-hidden { opacity: 0; }

    .hero-section-custom .drag-hint .hand-icon {
        animation: handSwipe 2s ease-in-out infinite;
        font-size: 0.9rem;
    }

    @keyframes handSwipe {
        0%, 100% { transform: translate(-3px, 2px) rotate(-5deg); }
        50% { transform: translate(3px, -2px) rotate(5deg); }
    }

    /* Label Layer */
    .hero-section-custom .label-layer {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 4;
        border-radius: 50%;
    }

    .hero-section-custom .country-label {
        position: absolute;
        top: 0; left: 0;
        transform: translate(-50%, -130%);
        display: flex;
        align-items: center;
        gap: 0.35rem;
        padding: 3px 9px;
        font-size: 10px;
        font-weight: 600;
        color: #f1f5f9;
        white-space: nowrap;
        background: rgba(10, 15, 35, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 20px;
        backdrop-filter: blur(6px);
        pointer-events: auto;
        cursor: pointer;
        box-shadow: 0 0 14px rgba(96, 165, 250, 0.12);
        transition: opacity 0.2s linear, transform 0.2s ease, background 0.2s ease;
        user-select: none;
    }

    .hero-section-custom .country-label .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #60a5fa;
        box-shadow: 0 0 6px #60a5fa;
        flex-shrink: 0;
    }

    .hero-section-custom .country-label:hover {
        background: rgba(59, 130, 246, 0.22);
        border-color: rgba(96, 165, 250, 0.5);
        transform: translate(-50%, -135%) scale(1.05);
    }

    .hero-section-custom .country-label.is-active {
        background: rgba(59, 130, 246, 0.3);
        border-color: #60a5fa;
        box-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
    }

    /* Globe Controls */
    .hero-section-custom .globe-controls {
        position: absolute;
        right: 6px;
        bottom: 38px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        z-index: 6;
    }

    .hero-section-custom .globe-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.04);
        color: #94a3b8;
        font-size: 13px;
        cursor: pointer;
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }

    .hero-section-custom .globe-btn:hover {
        background: rgba(59,130,246,0.18);
        border-color: rgba(96,165,250,0.4);
        color: white;
    }

    /* Globe Tooltip */
    .hero-section-custom .globe-tooltip {
        position: absolute;
        top: 0; left: 0;
        transform: translate(-50%, -135%);
        padding: 5px 10px;
        background: rgba(8, 12, 28, 0.92);
        border: 1px solid rgba(167, 139, 250, 0.35);
        border-radius: 10px;
        font-size: 11px;
        line-height: 1.3;
        color: #f1f5f9;
        pointer-events: none;
        z-index: 6;
        opacity: 0;
        white-space: nowrap;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        transition: opacity 0.2s ease;
    }

    .hero-section-custom .globe-tooltip strong { display: block; font-size: 11.5px; }
    .hero-section-custom .globe-tooltip span { color: #60a5fa; font-size: 10px; font-weight: 600; }

    /* Toast */
    .hero-section-custom .toast {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translate(-50%, 12px);
        padding: 0.7rem 1.2rem;
        background: rgba(15, 20, 40, 0.92);
        border: 1px solid rgba(96, 165, 250, 0.3);
        border-radius: 30px;
        font-size: 0.85rem;
        color: #f1f5f9;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s, transform 0.3s;
        z-index: 50;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .hero-section-custom .toast.show { opacity: 1; transform: translate(-50%, 0); }

    }

        .hero-section-custom .hero-left { max-width: 100%; }
        .hero-section-custom .hero-desc { margin: 0 auto 1.8rem; }
        .hero-section-custom .globe-wrapper { width: 260px; height: 260px; }
        .hero-section-custom .hero-right { min-height: 280px; flex-direction: column; gap: 1rem; }
    }

    @media (max-width: 768px) {

        .hero-section-custom .hero-right { min-height: 220px; }
        .hero-section-custom .country-label { font-size: 8px; padding: 2px 6px; }
        .hero-section-custom .hero-badge { font-size: 0.7rem; padding: 0.3rem 0.8rem; }

        .hero-section-custom .hero-title { font-size: 1.8rem; }
        .hero-section-custom .globe-wrapper { width: 160px; height: 160px; }
        .hero-section-custom .hero-right { min-height: 180px; }
        .hero-section-custom .hero-badge { font-size: 0.6rem; padding: 0.2rem 0.6rem; }

<script>
        // ========== LAST UPDATED TIME FUNCTION ==========
        let lastUpdatedTimestamp = null;

        // Function to format time ago
        function getTimeAgo(date) {
            if (!date) return 'Just now';
            const now = new Date();
            const diffMs = now - date;
            const diffSeconds = Math.floor(diffMs / 1000);
            const diffMinutes = Math.floor(diffSeconds / 60);
            const diffHours = Math.floor(diffMinutes / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffDays > 0) {
                return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            } else if (diffHours > 0) {
                return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            } else if (diffMinutes > 0) {
                return `${diffMinutes} minute${diffMinutes > 1 ? 's' : ''} ago`;
            } else if (diffSeconds > 0) {
                return `${diffSeconds} second${diffSeconds > 1 ? 's' : ''} ago`;
            } else {
                return 'Just now';
            }
        }

        // Function to update the display
        function updateTimeDisplay() {
            const timeElement = document.getElementById('lastUpdateTime');
            if (timeElement && lastUpdatedTimestamp) {
                timeElement.textContent = getTimeAgo(lastUpdatedTimestamp);
            }
        }

        // Initialize the last updated time
        function initializeLastUpdated() {
            // Get timestamp from Django template
            const timestampElement = document.getElementById('lastUpdatedTimestamp');
            if (timestampElement && timestampElement.value) {
                lastUpdatedTimestamp = new Date(timestampElement.value);
            } else {
                // Fallback: Use 2 hours ago
                const now = new Date();
                lastUpdatedTimestamp = new Date(now.getTime() - (2 * 60 * 60 * 1000));
            }
            updateTimeDisplay();
        }

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', function() {
            initializeLastUpdated();

            // Update every 30 seconds to keep the "ago" text fresh
            setInterval(updateTimeDisplay, 30000);

            // Also update when page becomes visible again
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    updateTimeDisplay();
                }
            });
        });
            // ========== STARS ==========
            const starsLayer = document.getElementById('starsLayer');
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.className = 'star-dot';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', (Math.random() * 3) + 's');
                const size = Math.random() * 1.8 + 0.4;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                starsLayer.appendChild(star);
            }

            // ========== TOAST ==========
            function showToast(msg) {
                const toastEl = document.getElementById('toast');
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                clearTimeout(toastEl._t);
                toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 2600);
            }

            // ========== COUNTRY SELECTION HANDLER ==========
            function selectCountryOnGlobe(countryName) {
                const indicator = document.getElementById('selectedCountryIndicator');
                const flagEl = document.getElementById('selectedCountryFlag');
                const nameEl = document.getElementById('selectedCountryName');
                const jobsEl = document.getElementById('selectedCountryJobs');

                const country = COUNTRIES.find(c => c.name === countryName);
                if (!country) return;

                const flag = FLAGS[countryName] || '🌍';

                flagEl.textContent = flag;
                nameEl.textContent = countryName;
                jobsEl.textContent = `${country.jobs.toLocaleString()} jobs open`;
                indicator.classList.add('show');

                const searchInput = document.querySelector('.search-field input[name="query"]');
                const locationInput = document.querySelector('.search-field input[name="location"]');
                const searchForm = document.getElementById('mainSearchForm');
                const searchBtn = searchForm?.querySelector('.search-btn');

                if (searchForm && searchInput) {
                    if (locationInput) {
                        locationInput.value = countryName;
                        locationInput.dispatchEvent(new Event('input', { bubbles: true }));
                    }

                    setTimeout(() => {
                        searchForm.scrollIntoView({ behavior: 'smooth', block: 'center' });

                        if (locationInput) {
                            locationInput.style.borderColor = '#60a5fa';
                            locationInput.style.boxShadow = '0 0 0 4px rgba(96, 165, 250, 0.2)';
                            setTimeout(() => {
                                locationInput.style.borderColor = '';
                                locationInput.style.boxShadow = '';
                            }, 2000);
                        }

                        if (searchBtn) {
                            searchBtn.style.transform = 'scale(1.05)';
                            setTimeout(() => {
                                searchBtn.style.transform = '';
                            }, 300);
                            searchForm.submit();
                        }

                        showToast(`🔍 Searching for opportunities in ${countryName}...`);
                    }, 500);
                } else {
                    showToast(`📍 Selected: ${countryName} - ${country.jobs.toLocaleString()} jobs available`);
                }

                highlightCountry(countryName);
            }

            function clearCountrySelection() {
                const indicator = document.getElementById('selectedCountryIndicator');
                const locationInput = document.querySelector('.search-field input[name="location"]');

                indicator.classList.remove('show');

                if (locationInput) {
                    locationInput.value = '';
                    locationInput.dispatchEvent(new Event('input', { bubbles: true }));
                }

                clearHighlight();
                showToast('Selection cleared');
            }

            function highlightCountry(name) {
                if (window.highlightCountryOnGlobe) {
                    window.highlightCountryOnGlobe(name);
                }
            }

            function clearHighlight() {
                if (window.clearHighlightOnGlobe) {
                    window.clearHighlightOnGlobe();
                }
            }

            window.selectCountryOnGlobe = selectCountryOnGlobe;
            window.clearCountrySelection = clearCountrySelection;

            document.addEventListener('DOMContentLoaded', function() {
                const clearBtn = document.getElementById('clearCountrySelection');
                if (clearBtn) {
                    clearBtn.addEventListener('click', clearCountrySelection);
                }
            });

            let COUNTRIES = [];
            let FLAGS = {};
            window.__globeCountries = null;
            window.__globeFlags = null;
</script>

    function initGlobe() {
        const R = 120;

        const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

        function lonLatPx(lon, lat, w, h) { return [((lon + 180) / 360) * w, ((90 - lat) / 180) * h]; }
        function blobPath(ctx, pts, w, h) {
            ctx.beginPath();
            pts.forEach(([lon, lat], i) => {
                const [x, y] = lonLatPx(lon, lat, w, h);
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.closePath();
        }

        function buildEarthTextures() {
            const w = 1024, h = 512;
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            const ctx = c.getContext('2d');

            const ocean = ctx.createLinearGradient(0, 0, 0, h);
            ocean.addColorStop(0, '#081226');
            ocean.addColorStop(0.15, '#0c2854');
            ocean.addColorStop(0.5, '#12497f');
            ocean.addColorStop(0.85, '#0c2854');
            ocean.addColorStop(1, '#081226');
            ctx.fillStyle = ocean;
            ctx.fillRect(0, 0, w, h);

            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(10, 25, 18, 0.4)';
            CONTINENTS.forEach(blob => {
                blobPath(ctx, blob.pts, w, h);
                ctx.fillStyle = blob.color;
                ctx.fill();
                ctx.stroke();
            });

            const iceFrac = (90 - 75) / 180;
            let g = ctx.createLinearGradient(0, 0, 0, h * iceFrac);
            g.addColorStop(0, 'rgba(225,238,250,0.95)');
            g.addColorStop(1, 'rgba(225,238,250,0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h * iceFrac);
            g = ctx.createLinearGradient(0, h * (1 - iceFrac), 0, h);
            g.addColorStop(0, 'rgba(225,238,250,0)');
            g.addColorStop(1, 'rgba(225,238,250,0.95)');
            ctx.fillStyle = g; ctx.fillRect(0, h * (1 - iceFrac), w, h * iceFrac);

            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let lat = -60; lat <= 60; lat += 30) {
                const y = lonLatPx(0, lat, w, h)[1];
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
            }
            for (let lon = -150; lon <= 180; lon += 30) {
                const x = lonLatPx(lon, 0, w, h)[0];
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
            }

            const spec = document.createElement('canvas'); spec.width = w; spec.height = h;
            const sctx = spec.getContext('2d');
            sctx.fillStyle = '#ffffff'; sctx.fillRect(0, 0, w, h);
            sctx.fillStyle = '#141414';
            CONTINENTS.forEach(blob => { blobPath(sctx, blob.pts, w, h); sctx.fill(); });

            const mapTex = new THREE.CanvasTexture(c);
            mapTex.colorSpace = THREE.SRGBColorSpace;
            const specTex = new THREE.CanvasTexture(spec);
            return { mapTex, specTex };
        }

        function buildCloudTexture() {
            const w = 512, h = 256;
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            for (let i = 0; i < 80; i++) {

                const r = 12 + Math.random() * 35;
                const a = 0.04 + Math.random() * 0.16;
                const g = ctx.createRadialGradient(x, y, 0, x, y, r);
                g.addColorStop(0, `rgba(255,255,255,${a})`);

        function buildDotTexture(rgb) {

            ctx.fillStyle = g;
            ctx.beginPath(); ctx.arc(s/2, s/2, s/2, 0, Math.PI * 2); ctx.fill();

        function lonLatToVec3(lon, lat, r) {

        CONNECTIONS.forEach(([a, b]) => {
            const ca = COUNTRY_BY_NAME.get(a), cb = COUNTRY_BY_NAME.get(b);
            if (!ca || !cb) return;
            const pa = lonLatToVec3(ca.lon, ca.lat, R * 1.002);
            const pb = lonLatToVec3(cb.lon, cb.lat, R * 1.002);
            const mid = pa.clone().add(pb).multiplyScalar(0.5).normalize().multiplyScalar(R * 1.25);
            const curve = new THREE.QuadraticBezierCurve3(pa, mid, pb);
            const geo = new THREE.TubeGeometry(curve, 16, 0.35, 4, false);
            const mat = new THREE.MeshBasicMaterial({ color: 0x06b6d4, transparent: true, opacity: 0.35 });
            globeGroup.add(new THREE.Mesh(geo, mat));
        });

        const DEFAULT_DIST = 400, MIN_DIST = 250, MAX_DIST = 700;
        let yaw = 0.35, pitch = -0.18;
        let targetYaw = yaw, targetPitch = pitch;
        let camDist = DEFAULT_DIST, targetDist = DEFAULT_DIST;

        function angleDiff(a, b) {
            let d = (b - a) % (Math.PI * 2);
            if (d > Math.PI) d -= Math.PI * 2;
            if (d < -Math.PI) d += Math.PI * 2;
            return d;
        }

        function computeYawTo(lon, lat) {
            const phi = deg(lon + 180), theta = deg(90 - lat);
            const dx = -Math.cos(phi) * Math.sin(theta);
            const dz = Math.sin(phi) * Math.sin(theta);
            let y = Math.atan2(-dx, dz);
            const zPrime = -dx * Math.sin(y) + dz * Math.cos(y);
            if (zPrime < 0) y += Math.PI;
            return y;
        }

        function selectCountry(name) {
            const c = COUNTRY_BY_NAME.get(name);
            if (!c) return;

            selectedCountryName = name;
            targetYaw = computeYawTo(c.lon, c.lat);
            targetPitch = clamp(deg(c.lat), -1.3, 1.3);
            flyingTo = true;
            autoRotateEnabled = false;

            COUNTRIES.forEach(country => {
                if (country.labelEl) {
                    country.labelEl.classList.toggle('is-active', country.name === name);
                }

            if (window.selectCountryOnGlobe) {

        function highlightOnly(name) {
            COUNTRIES.forEach(c => {
                if (!c.sprite) return;
                const active = c.name === name;
                c.sprite.material.opacity = active ? 1 : 0.45;
                if (c.labelEl) c.labelEl.classList.toggle('is-active', active);
            });

        function clearHighlight() {

                if (c.sprite) c.sprite.material.opacity = 1;
                if (c.labelEl) c.labelEl.classList.remove('is-active');
            });

        window.highlightCountryOnGlobe = highlightOnly;
        window.clearHighlightOnGlobe = clearHighlight;

        canvas.style.touchAction = 'none';
        let downX = 0, downY = 0, downTime = 0, moved = false, lastX = 0, lastY = 0;
        const pointers = new Map();

        function hideHint() { if (dragHintEl) dragHintEl.classList.add('is-hidden'); }

        canvas.addEventListener('pointerdown', e => {
            pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (pointers.size === 1) {
                isDragging = true; flyingTo = false;
                lastX = e.clientX; lastY = e.clientY;
                downX = e.clientX; downY = e.clientY; downTime = performance.now(); moved = false;
            }
            canvas.setPointerCapture(e.pointerId);
            hideHint();
            lastInteraction = performance.now();
        });

        canvas.addEventListener('pointermove', e => {
            if (pointers.has(e.pointerId)) pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

            if (pointers.size === 2) {
                const pts = [...pointers.values()];
                const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);

                    targetDist = clamp(targetDist - (dist - canvas._pinchDist) * 1.2, MIN_DIST, MAX_DIST);

                canvas._pinchDist = dist;
                return;

            if (isDragging) {
                const dx = e.clientX - lastX, dy = e.clientY - lastY;
                if (Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY) > 4) moved = true;
                const s = 0.0055;
                yaw += dx * s;
                pitch = clamp(pitch + dy * s, -1.45, 1.45);
                targetYaw = yaw; targetPitch = pitch;

            pointers.delete(e.pointerId);
            if (pointers.size < 2) canvas._pinchDist = null;
            if (pointers.size === 0 && isDragging) {
                isDragging = false;
                if (!moved && (performance.now() - downTime) < 450) handleClick(e);
                lastInteraction = performance.now();
            }
        }
        canvas.addEventListener('pointerup', endPointer);
        canvas.addEventListener('pointercancel', endPointer);
        canvas.addEventListener('pointerleave', () => { tooltipEl.classList.remove('is-visible'); canvas.style.cursor = 'grab'; });

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            targetDist = clamp(targetDist + e.deltaY * 0.4, MIN_DIST, MAX_DIST);
            lastInteraction = performance.now();
        }, { passive: false });

        const raycaster = new THREE.Raycaster();

        const pointerNDC = new THREE.Vector2();

        function pickCountry(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            pointerNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            pointerNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(pointerNDC, camera);
            const hits = raycaster.intersectObjects(raycastTargets, false);
            return hits.length ? hits[0].object.userData.country : null;
        }

        let hoveredName = null;
        function handleHover(e) {
            const name = pickCountry(e.clientX, e.clientY);
            canvas.style.cursor = name ? 'pointer' : 'grab';
            if (name) {

                const rect = wrapperEl.getBoundingClientRect();

                tooltipEl.innerHTML = `<strong>${FLAGS[name] ? FLAGS[name] + ' ' : ''}${name}</strong><span>${c.jobs.toLocaleString()} jobs open</span>`;
                tooltipEl.classList.add('is-visible');
            } else {
                tooltipEl.classList.remove('is-visible');

            hoveredName = name;
        }

        function handleClick(e) {
            const name = pickCountry(e.clientX, e.clientY);
            if (name) selectCountry(name);
        }

        document.getElementById('zoomIn').addEventListener('click', () => { targetDist = clamp(targetDist - 90, MIN_DIST, MAX_DIST); lastInteraction = performance.now(); });
        document.getElementById('zoomOut').addEventListener('click', () => { targetDist = clamp(targetDist + 90, MIN_DIST, MAX_DIST); lastInteraction = performance.now(); });
        document.getElementById('resetView').addEventListener('click', () => {
            targetYaw = 0.35; targetPitch = -0.18; targetDist = DEFAULT_DIST; flyingTo = true; lastInteraction = performance.now();
        });
        const toggleBtn = document.getElementById('toggleRotate');
        toggleBtn.addEventListener('click', () => {
            autoRotateEnabled = !autoRotateEnabled;
            toggleBtn.textContent = autoRotateEnabled ? '⏸' : '▶';
        });

        function applySize(size) {
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setSize(size, size, false);
            camera.aspect = 1;
            camera.updateProjectionMatrix();
        }
        new ResizeObserver(entries => {
            for (const entry of entries) applySize(entry.contentRect.width);
        }).observe(wrapperEl);
        applySize(wrapperEl.clientWidth || 320);

        const tmpVec = new THREE.Vector3();
        const tmpNormal = new THREE.Vector3();
        function updateLabels() {
            const rect = wrapperEl.getBoundingClientRect();
            const camDir = camera.position.clone().normalize();
            COUNTRIES.forEach(c => {
                if (!c.labelEl) return;
                c.sprite.getWorldPosition(tmpVec);
                tmpNormal.copy(tmpVec).normalize();
                const facing = tmpNormal.dot(camDir);
                if (facing < 0.1) { c.labelEl.style.opacity = '0'; c.labelEl.style.pointerEvents = 'none'; return; }
                const ndc = tmpVec.clone().project(camera);
                const x = (ndc.x * 0.5 + 0.5) * rect.width;
                const y = (1 - (ndc.y * 0.5 + 0.5)) * rect.height;
                c.labelEl.style.transform = `translate(${x}px, ${y}px) translate(-50%, -130%)`;
                c.labelEl.style.opacity = String(clamp((facing - 0.1) / 0.3, 0, 1));
                c.labelEl.style.pointerEvents = 'auto';
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();
            const idle = now - lastInteraction > 1500;

            if (flyingTo) {
                yaw += angleDiff(yaw, targetYaw) * 0.08;
                pitch += (targetPitch - pitch) * 0.08;
                if (Math.abs(angleDiff(yaw, targetYaw)) < 0.008 && Math.abs(pitch - targetPitch) < 0.008) flyingTo = false;
            } else if (!isDragging) {
                velYaw *= 0.94; velPitch *= 0.94;
                yaw += velYaw; pitch = clamp(pitch + velPitch, -1.45, 1.45);
                if (idle && autoRotateEnabled && Math.abs(velYaw) < 0.0005) yaw += 0.0022;
            }

            camDist += (targetDist - camDist) * 0.1;
            globeGroup.rotation.y = yaw;
            camera.position.set(0, camDist * Math.sin(pitch), camDist * Math.cos(pitch));
            camera.lookAt(0, 0, 0);

            cloudMesh.rotation.y += 0.0006;
            COUNTRIES.forEach(c => {
                if (c.ring) {
                    const t = (now * 0.001 + c.ring.userData.phase) % 2;
                    const s = c.sprite.userData.baseScale * (1.2 + t * 1.1);
                    c.ring.scale.set(s, s, 1);
                    c.ring.material.opacity = Math.max(0, 0.5 - t * 0.25);
                }
            });

            renderer.render(scene, camera);
            updateLabels();
        }
        animate();

        console.log('Globe ready —', COUNTRIES.length, 'countries,', CONNECTIONS.length, 'routes');
    }
</script>
