{% load static %}

<style>
    /* ========== NEWSLETTER SECTION ========== */
    .newsletter-section-modern {
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        padding: 4rem 5%;
        position: relative;
        overflow: hidden;
        border-radius: var(--radius-xl);
        margin: 0 5% 5rem;
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .newsletter-section-modern::before {
        content: '';
        position: absolute;
        top: -30%;
        right: -10%;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(37, 99, 235, 0.2) 0%, transparent 70%);
        border-radius: 50%;
        animation: floatGlowModern 6s ease-in-out infinite;
    }

    .newsletter-section-modern::after {
        content: '';
        position: absolute;
        bottom: -20%;
        left: -5%;
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
        border-radius: 50%;
        animation: floatGlowModern 8s ease-in-out infinite reverse;
    }

    @keyframes floatGlowModern {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(20px, -20px) scale(1.1); }
    }

    .newsletter-content-modern {
        position: relative;
        z-index: 2;
        max-width: 600px;
        margin: 0 auto;
        text-align: center;
    }

    .newsletter-title-modern {
        font-size: 2.25rem;
        font-weight: 700;
        color: white;
        margin-bottom: 1rem;
    }

    .newsletter-desc-modern {
        color: #94a3b8;
        font-size: 1.1rem;
        margin-bottom: 2rem;
        line-height: 1.6;
    }

    .newsletter-form-modern {
        display: flex;
        gap: 0.75rem;
        max-width: 500px;
        margin: 0 auto;
    }

    .newsletter-input-modern {
        flex: 1;
        padding: 0.9rem 1.25rem;
        border: 2px solid #334155;
        border-radius: var(--radius-sm);
        background: rgba(255, 255, 255, 0.05);
        color: white;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .newsletter-input-modern:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .newsletter-input-modern::placeholder {
        color: #64748b;
    }

    .newsletter-btn-modern {
        padding: 0.9rem 2rem;
        background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        color: white;
        border: none;
        border-radius: var(--radius-sm);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
        position: relative;
        overflow: hidden;
    }

    .newsletter-btn-modern::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        transform: translate(-50%, -50%);
        transition: width 0.6s, height 0.6s;
    }

    .newsletter-btn-modern:hover::before {
        width: 300px;
        height: 300px;
    }

    .newsletter-btn-modern:hover {
        background: var(--primary-dark);
        box-shadow: 0 8px 30px rgba(37, 99, 235, 0.4);
        transform: translateY(-2px);
    }

    .newsletter-features-modern {
        display: flex;
        gap: 2rem;
        justify-content: center;
        margin-top: 2rem;
        flex-wrap: wrap;
    }

    .newsletter-feature-modern {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: #94a3b8;
        font-size: 0.9rem;
    }

    .newsletter-feature-modern .check {
        color: #10b981;
        font-weight: bold;
        font-size: 1.1rem;
    }

    @media (max-width: 640px) {
        .newsletter-section-modern {
            padding: 3rem 4%;
            margin: 0 3% 4rem;
        }

        .newsletter-title-modern {
            font-size: 1.75rem;
        }

        .newsletter-form-modern {
            flex-direction: column;
        }

        .newsletter-features-modern {
            gap: 1rem;
        }
    }
</style>

<!-- ========== NEWSLETTER SECTION ========== -->
<section class="newsletter-section-modern animate-on-scroll">
    <div class="newsletter-content-modern">
        <h2 class="newsletter-title-modern">📧 Stay Updated with Job Alerts</h2>
        <p class="newsletter-desc-modern">
            Get the latest job and internship opportunities delivered directly to your inbox.
            Never miss out on your dream opportunity.
        </p>

        <form class="newsletter-form-modern" id="newsletterFormModern" onsubmit="subscribeNewsletterModern(event)">
            {% csrf_token %}
            <input type="email" name="email" class="newsletter-input-modern"
                   placeholder="Enter your email address" required>
            <button type="submit" class="newsletter-btn-modern">Subscribe Free</button>
        </form>

        <div class="newsletter-features-modern">
            <div class="newsletter-feature-modern">
                <span class="check">✓</span> Weekly job alerts
            </div>
            <div class="newsletter-feature-modern">
                <span class="check">✓</span> No spam, ever
            </div>
            <div class="newsletter-feature-modern">
                <span class="check">✓</span> Unsubscribe anytime
            </div>
        </div>
    </div>
</section>

<script>
    function subscribeNewsletterModern(event) {
        event.preventDefault();
        const form = document.getElementById('newsletterFormModern');
        const formData = new FormData(form);
        const btn = form.querySelector('.newsletter-btn-modern');

        btn.textContent = 'Subscribing...';
        btn.disabled = true;

        fetch('/subscribe/', {
            method: 'POST',
            body: formData,
            headers: {
                'X-CSRFToken': formData.get('csrfmiddlewaretoken'),
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                showToast('Successfully subscribed! 🎉');
                form.reset();
                createParticles(btn, '🎉');
            } else {
                showToast('You are already subscribed!', 'info');
            }
        })
        .catch(() => {
            showToast('Something went wrong. Please try again.', 'error');
        })
        .finally(() => {
            btn.innerHTML = 'Subscribe Free';
            btn.disabled = false;
        });
    }
</script>
