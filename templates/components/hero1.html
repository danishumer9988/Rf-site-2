{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Section</title>

    <style>
        /* ==========================
           HERO SECTION – AUTO HEIGHT
        ========================== */
        .hero {
            width: 100%;
            display: flex;
            align-items: center;
            background-color: #0f172a;

            background-image:
                linear-gradient(
                    90deg,
                    rgba(15,23,42,.97) 0%,
                    rgba(15,23,42,.92) 32%,
                    rgba(15,23,42,.60) 50%,
                    rgba(15,23,42,.15) 70%,
                    rgba(15,23,42,0) 100%
                ),
                url("{% static 'images/hero/hero.png' %}");

            background-repeat: no-repeat;
            background-position: right center;
            background-size: contain;
            padding: 80px 0;
        }

        /* ==========================
           CONTAINER
        ========================== */
        .container {
            width: 90%;
            max-width: 1350px;
            margin: auto;
        }

        /* ==========================
           HERO CONTENT
        ========================== */
        .hero-content {
            max-width: 620px;
            position: relative;
            z-index: 2;
            animation: fadeUp .9s ease;
        }

        .hero-content h1 {
            font-size: 56px;
            line-height: 1.1;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 25px;
            text-shadow: 0 5px 20px rgba(0,0,0,.35);
        }

        .hero-content p {
            font-size: 19px;
            line-height: 1.8;
            color: rgba(255,255,255,.90);
            max-width: 560px;
            margin-bottom: 45px;
            text-shadow: 0 3px 12px rgba(0,0,0,.30);
        }

        /* ==========================
           BUTTONS – MATCH LOGIN BUTTON
        ========================== */
        .btn-hero {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 16px 38px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.15);
            position: relative;
            overflow: hidden;
            margin-right: 18px;
            cursor: pointer;
        }

        .btn-hero:last-child {
            margin-right: 0;
        }

        /* Ripple animation */
        .btn-hero::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-hero:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-hero:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.35);
        }

        .btn-hero:active {
            transform: scale(0.97);
        }

        /* ==========================
           HERO BADGE
        ========================== */
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 22px;
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,.18);
            border-radius: 50px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            box-shadow: 0 8px 30px rgba(0,0,0,.15);
            margin-bottom: 35px;
            transition: .35s ease;
        }

        .hero-badge:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,.12);
            box-shadow: 0 12px 35px rgba(0,0,0,.20);
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }

        .live-dot::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 2px solid #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(.5); opacity: 1; }
            100% { transform: scale(2.3); opacity: 0; }
        }

        .update-time-text {
            color: #60a5fa;
            font-weight: 700;
        }

        /* ==========================
           ANIMATION
        ========================== */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==========================
           RESPONSIVE BREAKPOINTS
        ========================== */

        /* Large Laptop */
        @media (max-width: 1200px) {
            .hero {
                background-size: 48%;
            }
            .hero-content h1 {
                font-size: 48px;
            }
        }

        /* Tablet */
        @media (max-width: 992px) {
            .hero {
                background-position: 130% center;
                background-size: 60%;
                padding: 60px 0;
            }

            .hero-content {
                text-align: center;
                margin: auto;
                max-width: 100%;
            }

            .hero-content h1 {
                font-size: 42px;
            }

            .hero-content p {
                font-size: 18px;
                margin-left: auto;
                margin-right: auto;
                max-width: 100%;
            }

            .hero-badge {
                font-size: 14px;
                padding: 10px 18px;
                gap: 8px;
                margin-bottom: 30px;
                justify-content: center;
            }

            .live-dot {
                width: 9px;
                height: 9px;
            }
        }

        /* Mobile (portrait) */
        @media (max-width: 768px) {
            .hero {
                min-height: auto;
                padding: 40px 0;
                background-image:
                    linear-gradient(
                        rgba(15,23,42,.95),
                        rgba(15,23,42,.95)
                    ),
                    url("{% static 'images/hero4.png' %}");
                background-repeat: no-repeat;
                background-position: center center;
                background-size: cover;
                align-items: center;
            }

            .hero-content {
                text-align: center;
                max-width: 100%;
                padding: 0 10px;
            }

            .hero-content h1 {
                font-size: 32px;
                margin-bottom: 16px;
            }

            .hero-content p {
                font-size: 16px;
                margin-bottom: 28px;
                line-height: 1.6;
                max-width: 100%;
            }

            .btn-hero {
                width: 100%;
                max-width: 300px;
                padding: 14px 28px;
                font-size: 15px;
                justify-content: center;
                margin-right: 0;
                margin-bottom: 12px;
            }

            .btn-hero:last-child {
                margin-bottom: 0;
            }

            .hero-badge {
                font-size: 13px;
                padding: 8px 16px;
                gap: 6px;
                margin-bottom: 24px;
                justify-content: center;
                flex-wrap: wrap;
                width: 100%;
                max-width: 320px;
                margin-left: auto;
                margin-right: auto;
            }

            .live-dot {
                width: 8px;
                height: 8px;
            }

            .live-dot::before {
                inset: -5px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .hero {
                padding: 32px 0;
                background-size: cover;
            }

            .hero-content h1 {
                font-size: 26px;
                line-height: 1.2;
            }

            .hero-content p {
                font-size: 14px;
                margin-bottom: 22px;
            }

            .btn-hero {
                padding: 12px 24px;
                font-size: 14px;
                max-width: 260px;
            }

            .hero-badge {
                font-size: 11px;
                padding: 6px 14px;
                gap: 5px;
                margin-bottom: 20px;
                max-width: 280px;
            }

            .live-dot {
                width: 7px;
                height: 7px;
            }

            .live-dot::before {
                inset: -4px;
            }
        }

        /* Very small screens */
        @media (max-width: 380px) {
            .hero {
                padding: 28px 0;
            }
            .hero-content h1 {
                font-size: 22px;
            }
            .hero-content p {
                font-size: 13px;
            }
            .btn-hero {
                font-size: 13px;
                padding: 10px 20px;
            }
            .hero-badge {
                font-size: 10px;
                padding: 4px 12px;
                max-width: 240px;
            }
        }
    </style>
</head>

<body>
<section class="hero">
    <div class="container">
        <div class="hero-badge">
            <span class="live-dot"></span>
            Last updated
            <span class="update-time-text" id="lastUpdateTime">Just now</span>
            <input type="hidden" id="lastUpdatedTimestamp" value="{{ last_updated|date:'c' }}">
        </div>

        <div class="hero-content">
            <h1>Scanning Opportunities Connecting Careers</h1>
            <p>
                Discover verified jobs and internships from trusted employers. Start your journey toward the right opportunity with a platform built for ambitious professionals.
            </p>

            <a href="{% url 'job_list' %}" class="btn-hero">Find Jobs</a>
            <a href="{% url 'internship_list' %}" class="btn-hero">Explore Internships</a>
        </div>
    </div>
</section>

<script>
    const hero = document.querySelector(".hero-content");

    window.addEventListener("load", () => {
        hero.style.opacity = "1";
    });

    // ========== LAST UPDATED TIME FUNCTION ==========
    let lastUpdatedTimestamp = null;

    function getTimeAgo(date) {
        if (!date) return 'Just now';
        const now = new Date();
        const diffMs = now - date;
        const diffSeconds = Math.floor(diffMs / 1000);
        const diffMinutes = Math.floor(diffSeconds / 60);
        const diffHours = Math.floor(diffMinutes / 60);
        const diffDays = Math.floor(diffHours / 24);

        if (diffDays > 0) {
            return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
        } else if (diffHours > 0) {
            return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
        } else if (diffMinutes > 0) {
            return `${diffMinutes} minute${diffMinutes > 1 ? 's' : ''} ago`;
        } else if (diffSeconds > 0) {
            return `${diffSeconds} second${diffSeconds > 1 ? 's' : ''} ago`;
        } else {
            return 'Just now';
        }
    }

    function updateTimeDisplay() {
        const timeElement = document.getElementById('lastUpdateTime');
        if (timeElement && lastUpdatedTimestamp) {
            timeElement.textContent = getTimeAgo(lastUpdatedTimestamp);
        }
    }

    function initializeLastUpdated() {
        const timestampElement = document.getElementById('lastUpdatedTimestamp');
        if (timestampElement && timestampElement.value) {
            lastUpdatedTimestamp = new Date(timestampElement.value);
        } else {
            const now = new Date();
            lastUpdatedTimestamp = new Date(now.getTime() - (2 * 60 * 60 * 1000));
        }
        updateTimeDisplay();
    }

    document.addEventListener('DOMContentLoaded', function() {
        initializeLastUpdated();
        setInterval(updateTimeDisplay, 30000);
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                updateTimeDisplay();
            }
        });
    });
</script>
</body>
</html>
