{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hero Section</title>

    <style>

        /* ==========================
           RESET
        ========================== */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            background:#ffffff;
        }

        /* ==========================
           HERO SECTION
        ========================== */

        .hero{
            width:100%;
            min-height:100vh;

            display:flex;
            align-items:center;

            background-color:#0f172a;

            background-image:
                linear-gradient(
                    90deg,
                    rgba(15,23,42,.97) 0%,
                    rgba(15,23,42,.92) 32%,
                    rgba(15,23,42,.60) 50%,
                    rgba(15,23,42,.15) 70%,
                    rgba(15,23,42,0) 100%
                ),
                url("{% static 'images/hero/hero.png' %}");

            background-repeat:no-repeat;
            background-position:right center;
            background-size:contain;
        }

        /* ==========================
           CONTAINER
        ========================== */

        .container{
            width:90%;
            max-width:1350px;
            margin:auto;
        }

        /* ==========================
           HERO CONTENT
        ========================== */

        .hero-content{
            max-width:620px;
            position:relative;
            z-index:2;
            animation:fadeUp .9s ease;
        }

        .hero-content span{
            display:inline-block;
            color:#60a5fa;
            font-size:15px;
            font-weight:700;
            letter-spacing:2px;
            text-transform:uppercase;
            margin-bottom:20px;
        }

        .hero-content h1{
            font-size:56px;
            line-height:1.1;
            font-weight:800;
            color:#ffffff;
            margin-bottom:25px;
            text-shadow:0 5px 20px rgba(0,0,0,.35);
        }

        .hero-content p{
            font-size:19px;
            line-height:1.8;
            color:rgba(255,255,255,.90);
            max-width:560px;
            margin-bottom:45px;
            text-shadow:0 3px 12px rgba(0,0,0,.30);
        }

        /* ==========================
           BUTTONS
        ========================== */

        .buttons{
            display:flex;
            gap:18px;
            flex-wrap:wrap;
        }

        .btn{
            display:inline-flex;
            justify-content:center;
            align-items:center;

            padding:16px 38px;

            border-radius:50px;

            text-decoration:none;
            font-size:16px;
            font-weight:700;

            transition:.35s ease;
        }

        .btn-primary{
            background:#2563eb;
            color:#fff;
        }

        .btn-primary:hover{
            background:#3b82f6;
            transform:translateY(-4px);
            box-shadow:0 18px 35px rgba(37,99,235,.35);
        }

        .btn-secondary{
            background:rgba(255,255,255,.08);
            color:#ffffff;
            border:2px solid rgba(255,255,255,.25);
            backdrop-filter:blur(10px);
        }

        .btn-secondary:hover{
            background:rgba(255,255,255,.18);
            transform:translateY(-4px);
        }

        /* ==========================
           ANIMATION
        ========================== */

        @keyframes fadeUp{

            from{
                opacity:0;
                transform:translateY(60px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* ==========================
           LARGE LAPTOP
        ========================== */

        @media (max-width:1200px){

            .hero{
                background-size:48%;
            }

            .hero-content h1{
                font-size:48px;
            }

        }

        /* ==========================
           TABLET
        ========================== */

        @media (max-width:992px){

            .hero{

                background-position:130% center;
                background-size:60%;

            }

            .hero-content{

                text-align:center;
                margin:auto;

            }

            .hero-content h1{

                font-size:42px;

            }

            .hero-content p{

                font-size:18px;
                margin-left:auto;
                margin-right:auto;

            }

            .buttons{

                justify-content:center;

            }

        }

        /* ==========================
           MOBILE
        ========================== */

        @media (max-width:768px){

            .hero{

                min-height:90vh;

                background-image:
                    linear-gradient(
                        rgba(15,23,42,.93),
                        rgba(15,23,42,.93)
                    ),
                    url("{% static 'images/hero4.png' %}");

                background-repeat:no-repeat;
                background-position:center bottom;
                background-size:80%;

                padding:80px 0;

            }

            .hero-content{

                text-align:center;

            }

            .hero-content h1{

                font-size:34px;

            }

            .hero-content p{

                font-size:16px;

            }

            .buttons{

                flex-direction:column;

            }

            .btn{

                width:100%;

            }

        }

        /* ==========================
           SMALL MOBILE
        ========================== */

        @media (max-width:480px){

            .hero-content h1{

                font-size:28px;

            }

            .hero-content p{

                font-size:15px;

            }

            .hero{

                background-size:95%;

            }

        }

            /* ==========================
          HERO UPDATE BADGE
        ========================== */

        .hero-badge{
            display:inline-flex;
            align-items:center;
            gap:10px;

            padding:12px 22px;

            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            -webkit-backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,.18);

            border-radius:50px;

            color:#ffffff;
            font-size:15px;
            font-weight:600;

            box-shadow:
                0 8px 30px rgba(0,0,0,.15);

            margin-bottom:35px;

            transition:.35s ease;
        }

        .hero-badge:hover{

            transform:translateY(-3px);

            background:rgba(255,255,255,.12);

            box-shadow:
                0 12px 35px rgba(0,0,0,.20);

        }

        /* Live Dot */

        .live-dot{

            width:10px;
            height:10px;

            background:#22c55e;

            border-radius:50%;

            position:relative;

            flex-shrink:0;

        }

        /* Pulse Animation */

        .live-dot::before{

            content:'';

            position:absolute;

            inset:-6px;

            border-radius:50%;

            border:2px solid #22c55e;

            animation:pulse 2s infinite;

        }

        @keyframes pulse{

            0%{

                transform:scale(.5);
                opacity:1;

            }

            100%{

                transform:scale(2.3);
                opacity:0;

            }

        }

        /* Time Text */

        .update-time-text{

            color:#60a5fa;

            font-weight:700;

        }

        /* Mobile */

        @media(max-width:768px){

            .hero-badge{

                font-size:13px;

                padding:10px 18px;

                gap:8px;

            }

            .live-dot{

                width:8px;
                height:8px;

            }

        }

    </style>


</head>

<body>

<section class="hero">

    <div class="container">
        <div class="hero-badge">
            <span class="live-dot"></span>
            Last updated
            <span class="update-time-text" id="lastUpdateTime">Just now</span>

            <input
                    type="hidden"
                    id="lastUpdatedTimestamp"
                    value="{{ last_updated|date:'c' }}">
        </div>

        <div class="hero-content">

            <h1>
                Find Your Dream Career With Confidence
            </h1>

            <p>
                Discover verified jobs and internships from trusted employers. Start your journey toward the right opportunity with a platform built for ambitious professionals.
            </p>

            <div class="buttons">

                <a href="{% url 'job_list' %}" class="btn btn-primary">
                    Find Jobs
                </a>

                <a href="{% url 'internship_list' %}" class="btn btn-secondary">
                    Explore Internships
                </a>

            </div>

        </div>

    </div>

</section>

<script>

    const hero=document.querySelector(".hero-content");

    window.addEventListener("load",()=>{

    hero.style.opacity="1";

    });

            // ========== LAST UPDATED TIME FUNCTION ==========
        let lastUpdatedTimestamp = null;

        // Function to format time ago
        function getTimeAgo(date) {
            if (!date) return 'Just now';
            const now = new Date();
            const diffMs = now - date;
            const diffSeconds = Math.floor(diffMs / 1000);
            const diffMinutes = Math.floor(diffSeconds / 60);
            const diffHours = Math.floor(diffMinutes / 60);
            const diffDays = Math.floor(diffHours / 24);

            if (diffDays > 0) {
                return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
            } else if (diffHours > 0) {
                return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
            } else if (diffMinutes > 0) {
                return `${diffMinutes} minute${diffMinutes > 1 ? 's' : ''} ago`;
            } else if (diffSeconds > 0) {
                return `${diffSeconds} second${diffSeconds > 1 ? 's' : ''} ago`;
            } else {
                return 'Just now';
            }
        }

        // Function to update the display
        function updateTimeDisplay() {
            const timeElement = document.getElementById('lastUpdateTime');
            if (timeElement && lastUpdatedTimestamp) {
                timeElement.textContent = getTimeAgo(lastUpdatedTimestamp);
            }
        }

        // Initialize the last updated time
        function initializeLastUpdated() {
            // Get timestamp from Django template
            const timestampElement = document.getElementById('lastUpdatedTimestamp');
            if (timestampElement && timestampElement.value) {
                lastUpdatedTimestamp = new Date(timestampElement.value);
            } else {
                // Fallback: Use 2 hours ago
                const now = new Date();
                lastUpdatedTimestamp = new Date(now.getTime() - (2 * 60 * 60 * 1000));
            }
            updateTimeDisplay();
        }

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', function() {
            initializeLastUpdated();

            // Update every 30 seconds to keep the "ago" text fresh
            setInterval(updateTimeDisplay, 30000);

            // Also update when page becomes visible again
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    updateTimeDisplay();
                }
            });
        });


</script>

</body>
</html>
