<!-- ===== SIDEBAR TOGGLE BUTTON ===== -->
<button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

<!-- ===== SIDEBAR JAVASCRIPT ===== -->
<script>
    function toggleSidebar() {
        const s = document.getElementById('adminSidebar');
        const b = document.getElementById('sidebarToggle');
        const o = document.getElementById('sidebarOverlay');
        s.classList.toggle('open');
        b.innerHTML = s.classList.contains('open') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
        o.classList.toggle('active');
    }

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
            e.preventDefault();
            toggleSidebar();
        }
        if (e.key === 'Escape') {
            const s = document.getElementById('adminSidebar');
            if (s.classList.contains('open')) toggleSidebar();
        }
    });

    // Update time on all pages
    function updateDateTime() {
        const el = document.getElementById('currentDateTime');
        if (el) {
            const now = new Date();
            el.innerHTML = '<i class="far fa-clock"></i> ' + now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
    }
    if (document.getElementById('currentDateTime')) {
        updateDateTime();
        setInterval(updateDateTime, 1000);
    }

    console.log('✅ Admin Sidebar Loaded');
    console.log('💡 Press Ctrl+B to toggle sidebar');
</script>
