<style>
    .messages-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 9999;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .message {
        padding: 1rem 1.25rem;
        border-radius: var(--radius-md);
        animation: slideInRight 0.3s ease-out;
        box-shadow: var(--shadow-lg);
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid;
        font-size: 0.9rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .message:hover {
        transform: translateX(-5px);
    }

    @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOutRight {
        from { transform: translateX(0); opacity: 1; }
        to { transform: translateX(100%); opacity: 0; }
    }

    .message-success {
        background: rgba(16, 185, 129, 0.1);
        color: #065f46;
        border-color: rgba(16, 185, 129, 0.2);
    }

    .message-error {
        background: rgba(239, 68, 68, 0.1);
        color: #991b1b;
        border-color: rgba(239, 68, 68, 0.2);
    }

    .message-warning {
        background: rgba(245, 158, 11, 0.1);
        color: #92400e;
        border-color: rgba(245, 158, 11, 0.2);
    }

    .message-info {
        background: rgba(59, 130, 246, 0.1);
        color: #1e40af;
        border-color: rgba(59, 130, 246, 0.2);
    }

    .message-icon {
        font-size: 1.2rem;
        flex-shrink: 0;
        margin-top: 1px;
    }

    .message-close {
        margin-left: auto;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        opacity: 0.6;
        transition: opacity 0.3s;
        padding: 0;
        color: inherit;
        flex-shrink: 0;
    }

    .message-close:hover {
        opacity: 1;
    }

    /* Dark Mode */
    body.dark-mode .message {
        background: rgba(30, 41, 59, 0.8);
    }

    body.dark-mode .message-success {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border-color: rgba(16, 185, 129, 0.2);
    }

    body.dark-mode .message-error {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border-color: rgba(239, 68, 68, 0.2);
    }

    body.dark-mode .message-warning {
        background: rgba(245, 158, 11, 0.15);
        color: #fbbf24;
        border-color: rgba(245, 158, 11, 0.2);
    }

    body.dark-mode .message-info {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border-color: rgba(59, 130, 246, 0.2);
    }

    @media (max-width: 768px) {
        .messages-container {
            left: 20px;
            right: 20px;
            max-width: none;
        }
    }
</style>

<div class="messages-container" id="messagesContainer">
    {% if messages %}
    {% for message in messages %}
    <div class="message message-{{ message.tags }}" onclick="this.remove()">
            <span class="message-icon">
                {% if message.tags == 'success' %}✅
                {% elif message.tags == 'error' %}❌
                {% elif message.tags == 'warning' %}⚠️
                {% else %}ℹ️{% endif %}
            </span>
        <span>{{ message }}</span>
        <button class="message-close" onclick="event.stopPropagation(); this.parentElement.remove();">×</button>
    </div>
    {% endfor %}
    {% endif %}
</div>

<script>
    // Auto-remove messages after 5 seconds
    document.addEventListener('DOMContentLoaded', function() {
        const messages = document.querySelectorAll('.message');
        messages.forEach(function(message, index) {
            setTimeout(function() {
                message.style.animation = 'slideOutRight 0.3s ease-out forwards';
                setTimeout(function() {
                    message.remove();
                }, 300);
            }, 5000 + (index * 1000));
        });
    });
</script>
