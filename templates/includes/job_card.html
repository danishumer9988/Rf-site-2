<style>
    .job-card-mini {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 12px;
        padding: 1.5rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .job-card-mini::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #2563eb, #0891b2, #10b981);
        opacity: 0;
        transition: opacity 0.4s ease;
    }

    .job-card-mini:hover::before {
        opacity: 1;
    }

    .job-card-mini:hover {
        transform: translateY(-5px);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.9);
        border-color: #2563eb;
    }

    .job-card-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 0.75rem;
    }

    .job-card-title {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0;
    }

    .job-card-title a {
        color: var(--gray-900);
        text-decoration: none;
        transition: color 0.3s;
    }

    .job-card-title a:hover {
        color: #2563eb;
    }

    .job-type-badge {
        padding: 0.2rem 0.75rem;
        border-radius: 20px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.3px;
        white-space: nowrap;
        border: 1px solid transparent;
    }

    .badge-remote {
        background: rgba(59, 130, 246, 0.1);
        color: #2563eb;
        border-color: rgba(59, 130, 246, 0.2);
    }

    .badge-physical {
        background: rgba(16, 185, 129, 0.1);
        color: #10b981;
        border-color: rgba(16, 185, 129, 0.2);
    }

    .job-company {
        color: var(--gray-500);
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .job-details {
        display: flex;
        gap: 0.75rem;
        color: var(--gray-400);
        font-size: 0.8rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
    }

    .job-details span {
        display: flex;
        align-items: center;
        gap: 0.25rem;
    }

    .job-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .btn-sm {
        padding: 0.3rem 0.9rem;
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        border: none;
        line-height: 1;
    }

    .btn-primary {
        background: #2563eb;
        color: white;
    }

    .btn-primary:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .save-job-btn {
        background: none;
        border: 2px solid var(--gray-200);
        border-radius: 50%;
        width: 34px;
        height: 34px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        background: rgba(255, 255, 255, 0.5);
    }

    .save-job-btn:hover {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.05);
        transform: scale(1.1);
    }

    .save-job-btn.saved {
        background: rgba(239, 68, 68, 0.08);
        border-color: #ef4444;
        color: #ef4444;
        animation: heartPop 0.3s ease;
    }

    @keyframes heartPop {
        0% { transform: scale(1); }
        50% { transform: scale(1.3); }
        100% { transform: scale(1); }
    }

    .posted-date {
        color: var(--gray-400);
        font-size: 0.75rem;
    }

    /* Dark Mode */
    body.dark-mode .job-card-mini {
        background: rgba(30, 41, 59, 0.5);
        border-color: rgba(255, 255, 255, 0.05);
    }

    body.dark-mode .job-card-mini:hover {
        background: rgba(30, 41, 59, 0.8);
        border-color: #60a5fa;
    }

    body.dark-mode .job-card-title a {
        color: #e2e8f0;
    }

    body.dark-mode .job-card-title a:hover {
        color: #60a5fa;
    }

    body.dark-mode .job-company {
        color: #94a3b8;
    }

    body.dark-mode .job-details {
        color: #94a3b8;
    }

    body.dark-mode .posted-date {
        color: #64748b;
    }

    body.dark-mode .save-job-btn {
        background: rgba(30, 41, 59, 0.5);
        border-color: #334155;
    }

    body.dark-mode .save-job-btn:hover {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
    }
</style>

<div class="job-card-mini">
    <div class="job-card-header">
        <h3 class="job-card-title">
            <a href="{% url 'job_detail' job.slug %}">{{ job.title }}</a>
        </h3>
        <span class="job-type-badge {% if job.type == 'remote' %}badge-remote{% else %}badge-physical{% endif %}">
            {{ job.get_type_display }}
        </span>
    </div>

    <div class="job-company">
        <span>🏢</span> {{ job.company }}
    </div>

    <div class="job-details">
        <span>📍 {{ job.location }}</span>
        {% if job.salary %}
        <span>💰 {{ job.salary }}</span>
        {% endif %}
        <span class="posted-date">📅 {{ job.posted_at|date:"M d" }}</span>
    </div>

    <div class="job-footer">
        <a href="{% url 'job_detail' job.slug %}" class="btn-sm btn-primary">View Details</a>
        {% if user.is_authenticated %}
        <button class="save-job-btn {% if job.id in user_saved_jobs %}saved{% endif %}"
                onclick="toggleSave('{{ job.slug }}', this)"
                title="Save job">
            {% if job.id in user_saved_jobs %}❤️{% else %}🤍{% endif %}
        </button>
        {% endif %}
    </div>
</div>

<script>
    function toggleSave(slug, button) {
        fetch(`/jobs/${slug}/save/`, {
            method: 'POST',
            headers: {
                'X-CSRFToken': getCookie('csrftoken'),
                'X-Requested-With': 'XMLHttpRequest'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.saved) {
                button.innerHTML = '❤️';
                button.classList.add('saved');
            } else {
                button.innerHTML = '🤍';
                button.classList.remove('saved');
            }
        });
    }

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
